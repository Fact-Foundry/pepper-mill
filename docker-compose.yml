# PepperMill — local / self-hosted container stack.
#
#   1. cp .env.example .env   &&   edit .env  (set a real storage key)
#   2. docker compose up -d --build
#   3. curl http://localhost:5130/health
#
# The storage key is REQUIRED — compose refuses to start without it (the `:?`
# guard below), matching the server's own fail-fast. It comes from the
# environment / .env, never from this file. Site credentials are NOT
# configured here — each site establishes its own via registration.

services:
  peppermill:
    build: .
    image: factfoundry/peppermill:local
    container_name: peppermill
    restart: unless-stopped
    ports:
      # host 5130 → container 8080 (keeps the http://localhost:5130 you're used to)
      - "5130:8080"
    environment:
      PepperMill__EntitlementMode: Local
      PepperMill__StorageKeyBase64: ${PEPPERMILL_STORAGE_KEY:?set PEPPERMILL_STORAGE_KEY in .env — base64 of 32 random bytes}
      PepperMill__StorePath: /data/peppers
      # To register sites, allowlist your servers' registration callback hosts, e.g.:
      #   PepperMill__CallbackAllowedHosts__0: tf-server-1.internal
    volumes:
      # Durable, encrypted-at-rest pepper store + audit log. Back this up.
      - peppermill-data:/data

volumes:
  peppermill-data:
